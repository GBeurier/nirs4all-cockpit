          trigger: tag
          danger: safe
          publishes_on_dispatch: false
          inputs: []
      - registry: cran
        name: n4m
        state: tracked
        reason: "manual web submission; no admin button"
      - registry: cran
        name: pls4all
        state: tracked
        reason: "manual web submission; no admin button"
      - registry: github-release
