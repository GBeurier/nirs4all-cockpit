              type: string
              default: "true"
      - registry: crates
        name: nirs4all
        state: tracked
        reason: "RC aggregate crate is published as product version 0.2.13; release tag v0.2.13 is available"
        workflow:
          file: release-crates.yml
          trigger: tag
          danger: publish
          publishes_on_dispatch: true
