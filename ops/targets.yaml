        state: tracked
        workflow:
          file: release-npm.yml
          trigger: tag
          danger: publish
          publishes_on_dispatch: true
          inputs:
            - name: publish
              type: boolean
              default: false
      - registry: r-universe
        name: n4m
        state: tracked
        workflow:
          file: release-r.yml
          trigger: tag
          danger: safe
          publishes_on_dispatch: false
          inputs: []
      - registry: r-universe
