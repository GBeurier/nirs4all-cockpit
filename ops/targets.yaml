# nirs4all-cockpit — locked release inventory.
#
# Conforms to cockpit.model.Targets. One entry per package; each target names an
# EXACT registry name and, where a release workflow exists, its trigger + danger
# class + declared dispatch inputs. The cockpit only reads registries from this
# file; it never reimplements repo logic and never invents names.
#
# danger semantics (what a workflow_dispatch does):
#   safe      = dispatch never publishes
#   publish   = dispatch publishes only with the right input/tag
#   dangerous = dispatch publishes outright (strong confirmation in admin)
#
# state semantics:
#   tracked   = expected to be published; reconciled normally
#   excluded  = intentionally not on this registry (reason mandatory)
#   planned   = no release workflow yet (reconciles as missing, flagged, no admin button)

schema_version: 1
owner: GBeurier

packages:
  # ------------------------------------------------------------------------- #
  - id: nirs4all
    repo: nirs4all
    channel: production-held
    issues_repo: nirs4all
    tag_prefix: ""        # nirs4all tags are unprefixed (e.g. 0.10.1), not v-prefixed
    source_of_truth:
      strategy: python_attr
      path: nirs4all/__init__.py
      attr: __version__
    targets:
      - registry: readthedocs
        name: nirs4all
        state: tracked
        reason: "existing Python production documentation is maintained but held outside the final V1 RC; portable aggregate release is nirs4all-core 0.2.13"
      - registry: pypi
        name: nirs4all
        state: tracked
        reason: "existing Python production package remains 0.10.x and is intentionally not part of the final V1 RC release batch"
        workflow:
          file: publish.yml
          trigger: release_published
          danger: dangerous
          publishes_on_dispatch: true
          inputs: []
      - registry: github-release
        name: nirs4all
        state: tracked
        reason: "production release line kept for compatibility; final V1 RC release tracking is carried by nirs4all-core"
    version_aliases: {}

  # ------------------------------------------------------------------------- #
  - id: nirs4all-studio
    repo: nirs4all-studio
    channel: production-held
    issues_repo: nirs4all-studio
    source_of_truth:
      strategy: npm_package_json
      path: package.json
    tag_prefix: ""
    targets:
      - registry: readthedocs
        name: nirs4all-studio
        state: tracked
        reason: "existing Studio production documentation is maintained but held outside the final V1 RC application release"
      - registry: github-release
        name: nirs4all-studio
        state: tracked
        reason: "production app release remains held outside the final V1 RC; Windows installer RC remains held while RC10 coordination is tracked under tag n4a-v1-rc10-2026.07-refactor"
        workflow:
          file: release-unified.yml
          trigger: workflow_dispatch
          danger: dangerous
          publishes_on_dispatch: true
          inputs:
            - name: tag
              type: string
              required: true
            - name: skip_all_in_one
              type: boolean
              default: false
            - name: skip_docker
              type: boolean
              default: false
    version_aliases: {}

