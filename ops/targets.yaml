        state: tracked
        reason: "RC aggregate npm package is published as product version 0.2.13; release tag v0.2.13 is available"
        workflow:
          file: release-npm.yml
          trigger: tag
          danger: publish
          publishes_on_dispatch: true
          inputs:
            - name: publish
              type: boolean
              default: false
      - registry: r-universe
        name: nirs4all
        state: tracked
        reason: "R-universe target is the 0.2.13 RC aggregate from the v0.2.13 R source tarball; live R-universe may remain stale until the rebuild completes"
        workflow:
          file: release-r.yml
          trigger: tag
          danger: safe
          publishes_on_dispatch: false
          inputs: []
      - registry: cran
        name: nirs4all
        state: tracked
        reason: "manual web submission; CRAN remains unpublished for the 0.2.13 RC aggregate"
      - registry: github-release
        name: nirs4all-core
        state: tracked
        reason: "v0.2.13 release carries source/SBOM, MATLAB/Octave archive, R tarball, Python wheel/sdist fallback assets, and SHA256SUMS while PyPI Trusted Publisher setup is pending"
