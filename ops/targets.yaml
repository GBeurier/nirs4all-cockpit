    source_of_truth:
      strategy: c_header
      path: cpp/include/n4m/n4m_version.h
      attr: N4M_PROJECT_VERSION_STRING
    targets:
      - registry: readthedocs
        name: nirs4all-methods
        state: tracked
      - registry: pypi
        name: nirs4all-methods
        state: tracked
        workflow:
          file: release-wheels.yml
          trigger: tag
          danger: publish
          publishes_on_dispatch: true
          inputs:
            - name: version_tag
              type: string
              required: true
            - name: publish
              type: boolean
              default: false
      - registry: pypi
        name: pls4all
        state: tracked
        workflow:
          file: release-python.yml
          trigger: tag
          danger: publish
          publishes_on_dispatch: false
          inputs:
            - name: publish_to
              type: choice
              options: [none, testpypi]
              default: none
      - registry: npm
        name: "@nirs4all/methods-wasm"
        state: tracked
        workflow:
          file: release-npm.yml
          trigger: tag
          danger: publish
          publishes_on_dispatch: true
          inputs:
            - name: publish
              type: boolean
              default: false
      - registry: r-universe
        name: n4m
        state: tracked
