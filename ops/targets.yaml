  # installable alias until the cutover is complete.
  - id: nirs4all-core
    repo: nirs4all-core
    channel: production
    issues_repo: nirs4all-core
    source_of_truth:
      strategy: cargo_package
      path: bindings/rust/nirs4all/Cargo.toml
    targets:
      - registry: readthedocs
        name: nirs4all-core
        state: tracked
      - registry: pypi
        name: nirs4all-lite
        state: tracked
        workflow:
          file: release-python.yml
          trigger: tag
          danger: publish
          publishes_on_dispatch: false
          inputs:
            - name: dry_run
              type: string
              default: "true"
      # RC V1 naming migration: the Python aggregate distribution renames
      # nirs4all-lite -> nirs4all-core on the RC head. This is an expected
      # publication target now; nirs4all-lite stays tracked as the legacy alias.
      - registry: pypi
        name: nirs4all-core
        state: tracked
        reason: "RC V1 rename of nirs4all-lite; PyPI project/Trusted Publisher missing (invalid-publisher on v0.2.4 release)"
