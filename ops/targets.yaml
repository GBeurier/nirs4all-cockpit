# nirs4all-cockpit — locked release inventory.
#
# Conforms to cockpit.model.Targets. One entry per package; each target names an
# EXACT registry name and, where a release workflow exists, its trigger + danger
# class + declared dispatch inputs. The cockpit only reads registries from this
# file; it never reimplements repo logic and never invents names.
#
# danger semantics (what a workflow_dispatch does):
#   safe      = dispatch never publishes
#   publish   = dispatch publishes only with the right input/tag
#   dangerous = dispatch publishes outright (strong confirmation in admin)
#
# state semantics:
#   tracked   = expected to be published; reconciled normally
#   excluded  = intentionally not on this registry (reason mandatory)
#   planned   = no release workflow yet (reconciles as missing, flagged, no admin button)

schema_version: 1
owner: GBeurier

packages:
  # ------------------------------------------------------------------------- #
  - id: nirs4all
    repo: nirs4all
    channel: production
    issues_repo: nirs4all
    source_of_truth:
      strategy: python_attr
      path: nirs4all/__init__.py
      attr: __version__
    targets:
      - registry: pypi
        name: nirs4all
        state: tracked
        workflow:
          file: publish.yml
          trigger: release_published
          danger: dangerous
          publishes_on_dispatch: true
          inputs: []
      - registry: github-release
        name: nirs4all
        state: tracked
    version_aliases: {}

  # ------------------------------------------------------------------------- #
  - id: nirs4all-methods
    repo: nirs4all-methods
    channel: production
    issues_repo: nirs4all-methods
    source_of_truth:
      strategy: c_header
      path: cpp/include/n4m/n4m_version.h
      attr: N4M_PROJECT_VERSION_STRING
    targets:
      - registry: pypi
        name: nirs4all-methods
        state: tracked
        workflow:
          file: release-wheels.yml
          trigger: tag
          danger: publish
          publishes_on_dispatch: true
          inputs:
            - name: version_tag
              type: string
              required: true
            - name: publish
              type: boolean
              default: false
      - registry: pypi
        name: pls4all
        state: tracked
        workflow:
          file: release-python.yml
          trigger: tag
          danger: publish
          publishes_on_dispatch: false
          inputs:
            - name: publish_to
              type: choice
              options: [none, testpypi]
              default: none
      - registry: npm
        name: "@nirs4all/methods-wasm"
        state: tracked
        workflow:
          file: release-npm.yml
          trigger: tag
          danger: publish
          publishes_on_dispatch: true
          inputs:
            - name: publish
              type: boolean
              default: false
      - registry: r-universe
        name: n4m
        state: tracked
        workflow:
          file: release-r.yml
          trigger: tag
          danger: safe
          publishes_on_dispatch: false
          inputs: []
      - registry: r-universe
        name: pls4all
        state: tracked
        workflow:
          file: release-r.yml
          trigger: tag
          danger: safe
          publishes_on_dispatch: false
          inputs: []
      - registry: cran
        name: n4m
        state: tracked
        reason: "manual web submission; no admin button"
      - registry: cran
        name: pls4all
        state: tracked
        reason: "manual web submission; no admin button"
      - registry: github-release
        name: nirs4all-methods
        state: tracked
    version_aliases: {}

