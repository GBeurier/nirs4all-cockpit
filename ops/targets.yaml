          trigger: tag
          danger: safe
          publishes_on_dispatch: false
          inputs: []
      - registry: cran
        name: nirs4allformats
        state: excluded
        reason: "tarball >5Mo; canal officiel = R-universe"
      - registry: github-release
        name: nirs4all-formats
        state: tracked
    version_aliases: {}

