  # ------------------------------------------------------------------------- #
  # RC V1 aggregate: the logical package and canonical repository are now
  # nirs4all-core; the legacy nirs4all-lite PyPI name remains tracked as an
  # installable alias until the cutover is complete.
  - id: nirs4all-core
    repo: nirs4all-core
    channel: rc
    issues_repo: nirs4all-core
    coordination_tag: n4a-v1-rc14-2026.07-refactor
    source_of_truth:
      strategy: cargo_package
      path: bindings/rust/nirs4all/Cargo.toml
    targets:
      - registry: readthedocs
        name: nirs4all-core
        state: tracked
      - registry: pypi
        name: nirs4all-lite
        state: tracked
        reason: "legacy alias remains published at 0.2.0; RC aggregate target is nirs4all-core 0.2.13"
        workflow:
          file: release-python.yml
          trigger: tag
          danger: publish
          publishes_on_dispatch: false
          inputs:
            - name: dry_run
              type: string
              default: "true"
      # RC V1 naming migration: the Python aggregate distribution renames
      # nirs4all-lite -> nirs4all-core on the RC head. This is an expected
      # publication target now; nirs4all-lite stays tracked as the legacy alias.
      - registry: pypi
        name: nirs4all-core
        state: tracked
        reason: "RC V1 rename of nirs4all-lite; PyPI project remains blocked at v0.2.13 until Trusted Publisher is configured (invalid-publisher expected on release-python.yml, env pypi); GitHub Release v0.2.13 carries Python wheel/sdist fallback assets"
        workflow:
          file: release-python.yml
          trigger: tag
          danger: publish
          publishes_on_dispatch: false
          inputs:
