name: collect

# Read-only collection of registry / CI / issue state for the whole ecosystem,
# reconciled into data/current.json and committed back. Runs daily and on
# demand. The cockpit only aggregates public, read-only signals here.

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read
  issues: read

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install cockpit
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Checkout sibling repos (shallow — for code stats & manifest reads)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _siblings
          repos=$(python -c "import yaml; d=yaml.safe_load(open('ops/targets.yaml')); print(' '.join(sorted({p['repo'] for p in d['packages']})))")
          for r in $repos; do
            echo "::group::clone $r"
            git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository_owner }}/$r.git" "_siblings/$r" \
              || echo "skip $r (private or unavailable — its LOC/coverage will be omitted)"
            echo "::endgroup::"
          done

      - name: Collect snapshot
        env:
          # Ambient token: GitHub releases / workflow runs / issues (5000/h).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Read-only GoatCounter API token: public aggregate and per-page
          # Pages-visit counts only. The token never enters the snapshot.
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          # Google Search Console read-only service-account JSON. The service
          # account must be added as a user on the Search Console property.
          GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SEARCH_CONSOLE_SITE: sc-domain:nirs4all.org
          # Sentry auth token (project:read): aggregate public counters only.
          # Issue titles, permalinks, and user-identifying details stay out.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # Point the local-scan stats (LOC, tests, coverage, manifest versions)
          # at the shallow clones above, instead of the maintainer's working tree.
          N4A_SIBLINGS_ROOT: ${{ github.workspace }}/_siblings
        run: |
          n4a-cockpit collect --targets ops/targets.yaml --out data/current.json
          n4a-cockpit admin actions --current data/current.json --json-out data/manual-actions.json

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "No snapshot changes."
            exit 0
          fi
          git commit -m "chore(collect): refresh data/current.json"
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          git push origin "HEAD:${GITHUB_REF_NAME:-main}"
