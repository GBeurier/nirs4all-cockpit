name: collect

# Read-only collection of registry / CI / issue state for the whole ecosystem,
# reconciled into data/current.json and committed back. Runs every 6 hours and
# on demand. The cockpit only aggregates public, read-only signals here.

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read
  issues: read

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cockpit
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Collect snapshot
        env:
          # Ambient token: GitHub releases / workflow runs / issues (5000/h).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          n4a-cockpit collect --targets ops/targets.yaml --out data/current.json

      - name: Commit snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(collect): refresh data/current.json"
          file_pattern: "data/*.json data/history/*.json"
